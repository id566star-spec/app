<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30天打卡</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:"Noto Serif TC",serif;
  background:#2a001d;
  color:white;
}
.wrap{max-width:420px;margin:auto;padding:20px;}
.card{background:#3a0030;border-radius:16px;padding:16px;margin-bottom:16px;}
button{padding:12px;border:none;border-radius:10px;background:#ff6aa2;color:white;width:100%;}
input{width:100%;padding:10px;border-radius:10px;border:none;margin-bottom:10px;}
.day{display:inline-block;width:18%;margin:1%;padding:10px;border-radius:10px;text-align:center;}
.done{background:#ff6aa2;}
.today{border:2px solid yellow;}
</style>
</head>

<body>
<div class="wrap">

<div id="login">
  <div class="card">
    <h3>登入</h3>
    <input id="name" placeholder="暱稱">
    <input id="pin" placeholder="PIN">
    <button onclick="login()">進入</button>
  </div>
</div>

<div id="main" style="display:none">

  <div class="card">
    <h2 id="dayText"></h2>
    <div id="streak"></div>
  </div>

  <div class="card">
    <h3>日曆</h3>
    <div id="calendar"></div>
  </div>

  <div class="card">
    <h3>今日打卡</h3>
    <div id="habits"></div>
    <button onclick="submitCheckin()">打卡</button>
  </div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyixIIX2MEvntG6Z9Dy8RQAHs9sMEukOi-GDFL3t2oT7uFaCAvLjjW3dQpGHVqGjio/exec";

const habits=[
"早起","喝水","運動","閱讀","感恩","冥想","自我鼓勵"
];

function getToday(){
  return new Date(
    new Date().toLocaleString("en-US",{timeZone:"Asia/Taipei"})
  );
}

function format(d){
  return d.toISOString().split("T")[0];
}

function diff(a,b){
  return Math.floor((b-a)/86400000);
}

function login(){
  localStorage.setItem("user","1");
  start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";
  render();
}

function render(){

  let today=getToday();
  let todayStr=format(today);

  let startDate=localStorage.getItem("start");
  if(!startDate){
    localStorage.setItem("start",todayStr);
    startDate=todayStr;
  }

  let day=diff(new Date(startDate),today)+1;

  document.getElementById("dayText").innerText="Day "+day;

  renderCalendar(day);
  renderHabits();
}

function renderCalendar(todayDay){

  let html="";
  for(let i=1;i<=30;i++){

    let cls="day";
    if(i==todayDay) cls+=" today";

    if(localStorage.getItem("day"+i)) cls+=" done";

    html+=`<div class="${cls}" onclick="loadDay(${i})">Day${i}</div>`;
  }

  document.getElementById("calendar").innerHTML=html;
}

function renderHabits(){

  let html="";
  habits.forEach((h,i)=>{
    html+=`<label><input type="checkbox" id="h${i}">${h}</label><br>`;
  });

  document.getElementById("habits").innerHTML=html;
}

function submitCheckin(){

  let today=getToday();
  let todayStr=format(today);

  let start=localStorage.getItem("start");
  let day=diff(new Date(start),today)+1;

  if(localStorage.getItem("day"+day)){
    alert("今天已打卡");
    return;
  }

  let score=0;
  habits.forEach((h,i)=>{
    if(document.getElementById("h"+i).checked) score++;
  });

  localStorage.setItem("day"+day,score);

  render();
}

function loadDay(d){
  let score=localStorage.getItem("day"+d);
  if(!score){
    alert("尚未打卡");
    return;
  }
  alert("Day"+d+" 分數："+score);
}

if(localStorage.getItem("user")){
  start();
}

</script>

</body>
</html>
