<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30天打卡身心靈成長競賽</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg1:#52002a;
      --bg2:#2a001d;
      --text:#fff4f7;
      --shadow:0 16px 40px rgba(0,0,0,.25);
    }

    body{
      margin:0;
      font-family:"Noto Serif TC","PMingLiU","MingLiU","Songti TC",serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, #8d155d 0%, transparent 25%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:430px;
      margin:0 auto;
      padding:18px 16px 32px;
    }

    .hidden{ display:none !important; }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .userbox{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#8b2cff,#ff5aa5);
      font-size:18px;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
      flex:0 0 46px;
    }

    .user-meta .tiny{
      font-size:12px;
      color:#ffd4e8;
      opacity:.85;
    }

    .user-meta .name{
      font-size:24px;
      line-height:1.1;
      color:#fff4f7;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .streak{
      flex:0 0 auto;
      background:rgba(255,166,0,.18);
      color:#ffe7aa;
      border:1px solid rgba(255,210,120,.22);
      border-radius:16px;
      padding:10px 12px;
      font-size:14px;
      box-shadow:0 6px 16px rgba(0,0,0,.16);
    }

    .quote-card{
      background:linear-gradient(90deg, rgba(143,0,72,.88), rgba(45,130,147,.78));
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:16px 18px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .quote-card .quote-text{
      text-align:center;
      font-size:16px;
      line-height:1.7;
      padding:0 10px;
    }

    .hero{
      background:linear-gradient(135deg, #9f003f 0%, #7a1a76 100%);
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:22px 18px 18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:18px;
    }

    .hero .day-big{
      text-align:center;
      font-size:52px;
      line-height:1;
      margin-top:4px;
      margin-bottom:8px;
      font-weight:700;
    }

    .hero .day-sub{
      text-align:center;
      font-size:18px;
      color:#ffe4f0;
      margin-bottom:6px;
    }

    .hero .date-sub{
      text-align:center;
      font-size:14px;
      color:#ffd7eb;
      opacity:.9;
      margin-bottom:14px;
    }

    .hero-tip{
      background:rgba(54,16,56,.35);
      border:1px solid rgba(255,255,255,.06);
      border-radius:16px;
      padding:14px 12px;
      text-align:center;
      font-size:15px;
      line-height:1.6;
      color:#ffe9f2;
    }

    .section-title{
      font-size:20px;
      color:#ffe6f1;
      margin:18px 0 10px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .challenge-card,
    .form-card,
    .stats-card,
    .login-card{
      background:rgba(40,18,0,.42);
      border-radius:22px;
      padding:18px 14px 20px;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .challenge-card{
      background:linear-gradient(180deg, rgba(18,25,33,.88), rgba(22,28,36,.96));
      padding:18px 14px;
    }

    .challenge-grid{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
    }

    .day-tile{
      background:linear-gradient(180deg, #242b34, #1d222b);
      border:1px solid rgba(255,255,255,.05);
      border-radius:16px;
      min-height:110px;
      padding:10px 8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      text-align:center;
      color:#dfe6ee;
      transition:.2s ease;
    }

    .day-tile.clickable{
      cursor:pointer;
      pointer-events:auto;
    }

    .day-tile.clickable:hover{
      transform:translateY(-2px) scale(1.01);
      border-color:rgba(255,255,255,.18);
    }

    .day-tile.done{
      background:linear-gradient(180deg, rgba(164,0,64,.9), rgba(99,14,46,.92));
      border-color:rgba(255,80,150,.55);
      color:#fff6fb;
    }

    .day-tile.pending{
      background:linear-gradient(180deg, rgba(41,48,58,.96), rgba(28,34,42,.98));
      color:#d2dae3;
    }

    .day-tile.future{
      color:#b4bcc6;
    }

    .day-tile.today{
      outline:2px solid rgba(255,173,112,.75);
      outline-offset:0;
    }

    .tile-icon{
      font-size:22px;
      line-height:1;
    }

    .tile-title{
      font-size:14px;
      line-height:1.2;
    }

    .tile-sub{
      font-size:11px;
      line-height:1.2;
      opacity:.95;
    }

    .tile-meta{
      font-size:10px;
      line-height:1.2;
      color:#ffd8ea;
    }

    .field{ margin-bottom:14px; }

    .label{
      font-size:15px;
      margin-bottom:8px;
      color:#ffd8bb;
      display:block;
    }

    input, textarea{
      width:100%;
      border:none;
      outline:none;
      padding:14px;
      border-radius:14px;
      font-size:16px;
      background:rgba(255,255,255,.12);
      color:#fff4ea;
      font-family:inherit;
    }

    textarea{
      min-height:92px;
      resize:vertical;
    }

    input::placeholder,
    textarea::placeholder{
      color:rgba(255,234,220,.68);
    }

    .habit-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,.08);
      padding:13px 14px;
      border-radius:14px;
      margin-bottom:10px;
      font-size:15px;
      color:#fff0e3;
      gap:12px;
    }

    .habit-left{
      display:flex;
      align-items:center;
      gap:10px;
      flex:1;
      min-width:0;
    }

    .habit-badge{
      width:28px;
      height:28px;
      flex:0 0 28px;
      border-radius:999px;
      background:rgba(255,176,123,.22);
      border:1px solid rgba(255,176,123,.5);
      color:#fff3e8;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
    }

    .habit-item input[type="checkbox"]{
      width:24px;
      height:24px;
      accent-color:#ff9f66;
      flex:0 0 24px;
    }

    .sub-card{
      background:rgba(255,255,255,.06);
      border-radius:18px;
      padding:14px;
      margin-top:14px;
      border:1px solid rgba(255,255,255,.08);
    }

    .sub-title{
      font-size:18px;
      margin-bottom:12px;
      color:#fff0db;
      text-align:center;
    }

    .score-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:10px;
      margin-bottom:8px;
    }

    .score-box{
      background:rgba(255,255,255,.08);
      border-radius:14px;
      padding:10px 8px;
      text-align:center;
    }

    .score-label{
      font-size:12px;
      color:#ffd7bd;
      margin-bottom:4px;
    }

    .score-value{
      font-size:20px;
      color:#fff6ee;
    }

    .btns{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:12px;
    }

    button{
      border:none;
      outline:none;
      cursor:pointer;
      background:#b96539;
      color:#fff;
      border-radius:16px;
      padding:13px 18px;
      font-size:17px;
      font-family:inherit;
      box-shadow:0 6px 14px rgba(0,0,0,.16);
      width:100%;
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .small-btn{
      background:#92634d;
      font-size:15px;
      padding:11px 18px;
      box-shadow:none;
      width:auto;
    }

    .outline-btn{
      background:transparent;
      color:#ffd7bd;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:none;
      width:auto;
    }

    .msg{
      margin-top:12px;
      text-align:center;
      font-size:14px;
      min-height:22px;
      color:#ffd4ba;
      line-height:1.6;
      white-space:pre-wrap;
    }

    .chart-card{
      background:rgba(32,14,0,.34);
      border-radius:18px;
      padding:14px;
      margin-top:14px;
      border:1px solid rgba(255,255,255,.10);
    }

    .chart-title{
      font-size:17px;
      margin-bottom:12px;
      text-align:center;
      color:#fff0db;
    }

    .hint{
      text-align:center;
      color:#ffd6bb;
      font-size:13px;
      margin-top:8px;
      line-height:1.6;
    }

    .rank-list {
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .rank-item {
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,0.07);
      border-radius:14px;
      padding:12px 14px;
      border:1px solid rgba(255,255,255,0.06);
    }

    .rank-left {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .rank-no {
      width:30px;
      height:30px;
      border-radius:999px;
      background:rgba(255,255,255,0.10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
    }

    .rank-name {
      font-size:15px;
      color:#fff2e8;
    }

    .rank-score {
      font-size:14px;
      color:#ffd6bb;
    }

    @media (max-width:380px){
      .challenge-grid{
        gap:10px;
      }
      .day-tile{
        min-height:98px;
      }
      .hero .day-big{
        font-size:44px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="loginPage" class="login-card">

          <div class="field">

            <textarea id="reviewGood" placeholder="哪怕只是小事，也值得被看見 🌱"></textarea>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbzHormlgobgPEv8ltExWctbY3pEr-GWJTMblPnNP9GB_g2D7zkeRQPx3wnD__jJ8-3n/exec";

    const quotes = [
      "「相信過程，你已比昨天的自己更好了。」🌸",
      "「慢慢來，你也正在閃閃發亮。」✨",

      "「穩穩地走，比什麼都重要。」💛",
      "「只要沒有放棄，你就在成長。」☀️"
    ];

    const calendarQuotes = [
      "✨ 萬事起頭難，勇敢開始就是成功！✨",
      "🌱 今天的一小步，就是未來的一大步。",
      "💖 你願意開始，就已經很棒了。",
      "🌸 不急，你正在慢慢變成更好的自己。",
      "🔥 持續下去，你會看到自己的光。"
    ];

    const habitList = [
      "早起 10 分鐘",
      "喝足夠的水",
      "運動 / 伸展",
      "閱讀 10 分鐘",
      "感恩一件事",
      "正念安靜一下",
      "鼓勵自己一句話"
    ];

    const nicknameInput = document.getElementById("nickname");
    const pinInput = document.getElementById("pin");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const loginMsg = document.getElementById("loginMsg");

    const mainPage = document.getElementById("mainPage");
    const loginPage = document.getElementById("loginPage");

    const avatarText = document.getElementById("avatarText");
    const userNameText = document.getElementById("userNameText");
    const streakText = document.getElementById("streakText");

    const quoteText = document.getElementById("quoteText");
    const calendarQuote = document.getElementById("calendarQuote");
    const heroDayBig = document.getElementById("heroDayBig");
    const heroDaySub = document.getElementById("heroDaySub");
    const heroDateSub = document.getElementById("heroDateSub");

    const habitsBox = document.getElementById("habitsBox");
    const todayHabitStatus = document.getElementById("todayHabitStatus");
    const todayReviewStatus = document.getElementById("todayReviewStatus");

    const reviewGood = document.getElementById("reviewGood");
    const reviewBad = document.getElementById("reviewBad");
    const reviewBetter = document.getElementById("reviewBetter");

    const habitScoreBox = document.getElementById("habitScoreBox");
    const reviewScoreBox = document.getElementById("reviewScoreBox");
    const totalScoreBox = document.getElementById("totalScoreBox");

    const checkinBtn = document.getElementById("checkinBtn");
    const reviewBtn = document.getElementById("reviewBtn");
    const checkinMsg = document.getElementById("checkinMsg");
    const reviewMsg = document.getElementById("reviewMsg");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const historyWrap = document.getElementById("historyWrap");
    const statsWrap = document.getElementById("statsWrap");
    const leaderboardWrap = document.getElementById("leaderboardWrap");

    let scoreChart = null;
    let currentRows = [];
    let todayRecord = null;
    let editingRecord = null;

    quoteText.textContent = quotes[Math.floor(Math.random() * quotes.length)];
    calendarQuote.textContent = calendarQuotes[Math.floor(Math.random() * calendarQuotes.length)];

    function getTaipeiNow() {
      return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Taipei" }));
    }

    function formatDateToYMD(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getTodayStr() {
      return formatDateToYMD(getTaipeiNow());
    }

    function normalizeDateString(raw) {
      if (!raw) return "";
      const s = String(raw).trim().replace(/\//g, "-");
      const parts = s.split("-");
      if (parts.length === 3) {
        const y = parts[0];
        const m = String(parts[1]).padStart(2, "0");
        const d = String(parts[2]).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }
      return s;
    }

    function formatTaiwanDate(dateStr) {
      const parts = normalizeDateString(dateStr).split("-");
      const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
      const week = ["日","一","二","三","四","五","六"];
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 星期${week[d.getDay()]}`;
    }

    function numberToZh(num) {
      const arr = ["零","一","二","三","四","五","六","七","八","九","十",
        "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
        "二十一","二十二","二十三","二十四","二十五","二十六","二十七","二十八","二十九","三十"];
      return arr[num] || String(num);
    }

    function diffDays(dateA, dateB) {
      const a = new Date(normalizeDateString(dateA) + "T00:00:00");
      const b = new Date(normalizeDateString(dateB) + "T00:00:00");
      if (isNaN(a.getTime()) || isNaN(b.getTime())) return 0;
      return Math.floor((b.getTime() - a.getTime()) / 86400000);
    }

    function getChallengeStartDate() {
      let saved = localStorage.getItem("challenge_start_date");
      const today = getTodayStr();

      if (!saved || saved === "undefined" || saved === "null") {
        localStorage.setItem("challenge_start_date", today);
        return today;
      }

      saved = normalizeDateString(saved);

      if (!/^\d{4}-\d{2}-\d{2}$/.test(saved)) {
        localStorage.setItem("challenge_start_date", today);
        return today;
      }

      return saved;
    }

    function setChallengeStartDateFromRows(rows) {
      if (!rows || !rows.length) {
        localStorage.setItem("challenge_start_date", getTodayStr());
        return;
      }

      const sorted = rows
        .map(r => normalizeDateString(r.date))
        .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
        .sort((a, b) => a.localeCompare(b));

      if (!sorted.length) {
        localStorage.setItem("challenge_start_date", getTodayStr());
        return;
      }

      localStorage.setItem("challenge_start_date", sorted[0]);
    }

    function calculateHabitScore(habits) {
      return (habits || []).filter(Boolean).length;
    }

    function calculateReviewScore(good, bad, better) {
      let score = 0;
      if (String(good || "").trim()) score += 1;
      if (String(bad || "").trim()) score += 1;
      if (String(better || "").trim()) score += 1;
      return score;
    }

    function updateScoreBoxes(record = null) {
      const habits = record?.habits || getSelectedHabits();
      const good = record ? record.review_good : reviewGood.value;
      const bad = record ? record.review_bad : reviewBad.value;
      const better = record ? record.review_better : reviewBetter.value;

      const hScore = calculateHabitScore(habits);
      const rScore = calculateReviewScore(good, bad, better);
      const total = hScore + rScore;

      habitScoreBox.textContent = `${hScore}/7`;
      reviewScoreBox.textContent = `${rScore}/3`;
      totalScoreBox.textContent = `${total}/10`;
    }

    function renderHabits(selected = []) {
      habitsBox.innerHTML = "";
      habitList.forEach((habit, index) => {
        const item = document.createElement("label");
        item.className = "habit-item";
        item.innerHTML = `
          <div class="habit-left">
            <div class="habit-badge">${index + 1}</div>
            <div>${habit}</div>
          </div>
          <input type="checkbox" id="habit_${index}" ${selected[index] ? "checked" : ""}>
        `;
        habitsBox.appendChild(item);
      });

      for (let i = 0; i < habitList.length; i++) {
        document.getElementById(`habit_${i}`).addEventListener("change", () => updateScoreBoxes());
      }
    }

    function getSelectedHabits() {
      const habits = [];
      for (let i = 0; i < habitList.length; i++) {
        habits.push(document.getElementById(`habit_${i}`).checked);
      }
      return habits;
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      registerBtn.disabled = isLoading;
      checkinBtn.disabled = isLoading;
      reviewBtn.disabled = isLoading;
      refreshBtn.disabled = isLoading;
    }

    function showMessage(el, text, isError = false) {
      el.textContent = text;
      el.style.color = isError ? "#ff9e9e" : "#ffd4ba";
    }

    function validateInput() {
      const nickname = nicknameInput.value.trim();
      const pin = pinInput.value.trim();

      if (!nickname) {
        showMessage(loginMsg, "請先輸入暱稱", true);
        return null;
      }

      if (!/^\d{4}$/.test(pin)) {
        showMessage(loginMsg, "PIN 必須是 4 位數字", true);
        return null;
      }

      return { nickname, pin };
    }

    async function postData(data) {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data)
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error("API 回傳不是 JSON：" + text);
      }
    }

    function normalizeHistoryRows(rows) {
      return rows.map(row => ({
        id: String(row[0] || "").trim(),
        user_id: String(row[1] || "").trim(),
        date: normalizeDateString(row[2]),
        habits: [row[3], row[4], row[5], row[6], row[7], row[8], row[9]].map(v => v === true || v === "TRUE" || v === "true"),
        habit_score: Number(row[10]) || 0,
        review_good: String(row[11] || ""),
        review_bad: String(row[12] || ""),
        review_better: String(row[13] || ""),
        review_score: Number(row[14]) || 0,
        total_score: Number(row[15]) || 0,
        created_at: row[16] || ""
      }));
    }

    function updateHeaderUI() {
      const nickname = localStorage.getItem("nickname") || "你";
      avatarText.textContent = nickname.charAt(0) || "你";
      userNameText.textContent = nickname;
    }

    function calculateStreak(rows) {
      if (!Array.isArray(rows) || rows.length === 0) return 0;

      const today = getTodayStr();
      const dateSet = new Set(
        rows.map(r => normalizeDateString(r.date)).filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))
      );

      if (!dateSet.has(today)) return 0;

      let streak = 1;
      let cursor = new Date(today + "T00:00:00");

      while (true) {
        cursor.setDate(cursor.getDate() - 1);
        const prev = formatDateToYMD(cursor);
        if (dateSet.has(prev)) streak++;
        else break;
      }

      return streak;
    }

    function updateHero(rows) {
      const startDate = getChallengeStartDate();
      const today = getTodayStr();

      let dayNum = diffDays(startDate, today) + 1;
      if (!Number.isFinite(dayNum) || dayNum < 1) dayNum = 1;
      if (dayNum > 30) dayNum = 30;

      heroDayBig.textContent = `Day ${dayNum}`;
      heroDaySub.textContent = `第${numberToZh(dayNum)}天`;
      heroDateSub.textContent = formatTaiwanDate(today);

      const streak = calculateStreak(rows);
      streakText.textContent = `🔥 ${streak}天連續`;
    }

    function fillFormWithRecord(record) {
      renderHabits(record?.habits || []);
      reviewGood.value = record?.review_good || "";
      reviewBad.value = record?.review_bad || "";
      reviewBetter.value = record?.review_better || "";
      updateScoreBoxes(record);
    }

    function clearTodayForm() {
      renderHabits([]);
      reviewGood.value = "";
      reviewBad.value = "";
      reviewBetter.value = "";
      updateScoreBoxes();
    }

    function updateTodayStatus() {
      const today = getTodayStr();

      if (editingRecord) {
        const isEditingToday = normalizeDateString(editingRecord.date) === today;

        todayHabitStatus.textContent = `目前正在編輯 ${editingRecord.date} 的習慣打卡資料。`;
        todayReviewStatus.textContent = `目前正在編輯 ${editingRecord.date} 的每日復盤資料。`;

        if (isEditingToday) {
          checkinBtn.disabled = false;
          reviewBtn.disabled = false;
        } else {
          checkinBtn.disabled = false;
          reviewBtn.disabled = false;
        }
        return;
      }

      if (todayRecord && normalizeDateString(todayRecord.date) === today) {
        const habitDone = todayRecord.habit_score > 0;
        const reviewDone = todayRecord.review_score > 0;

        todayHabitStatus.textContent = habitDone
          ? `今天習慣打卡已送出，分數 ${todayRecord.habit_score}/7。可點上方今天卡片編輯。`
          : "今天習慣打卡尚未送出。";

        todayReviewStatus.textContent = reviewDone
          ? `今天每日復盤已送出，分數 ${todayRecord.review_score}/3。可點上方今天卡片編輯。`
          : "今天每日復盤尚未送出。";

        checkinBtn.disabled = habitDone;
        reviewBtn.disabled = reviewDone;
      } else {
        todayHabitStatus.textContent = "今天還沒送出習慣打卡。";
        todayReviewStatus.textContent = "今天還沒送出每日復盤。";
        checkinBtn.disabled = false;
        reviewBtn.disabled = false;
      }
    }

    async function registerUser() {
      const form = validateInput();
      if (!form) return;

      setLoading(true);
      showMessage(loginMsg, "註冊中...");

      try {
        const data = await postData({
          action: "register",
          nickname: form.nickname,
          pin: form.pin
        });

        if (data.status === "success") {
          localStorage.setItem("user_id", data.user_id);
          localStorage.setItem("nickname", form.nickname);
          localStorage.setItem("challenge_start_date", getTodayStr());
          showMessage(loginMsg, "註冊成功");
          await enterMainPage();
        } else {
          showMessage(loginMsg, data.message || "註冊失敗", true);
        }
      } catch (error) {
        showMessage(loginMsg, "註冊失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function loginUser() {
      const form = validateInput();
      if (!form) return;

      setLoading(true);
      showMessage(loginMsg, "登入中...");

      try {
        const data = await postData({
          action: "login",
          nickname: form.nickname,
          pin: form.pin
        });

        if (data.status === "success") {
          localStorage.setItem("user_id", data.user_id);
          localStorage.setItem("nickname", form.nickname);
          showMessage(loginMsg, "登入成功");
          await enterMainPage();
        } else {
          showMessage(loginMsg, "登入失敗，請確認暱稱與 PIN", true);
        }
      } catch (error) {
        showMessage(loginMsg, "登入失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function fetchHistoryData() {
      const userId = localStorage.getItem("user_id");
      if (!userId) throw new Error("尚未登入");

      const data = await postData({
        action: "getData",
        user_id: userId
      });

      if (data.status !== "success") {
        throw new Error(data.message || "取得資料失敗");
      }

      return normalizeHistoryRows(data.data || []);
    }

    async function fetchLeaderboard() {
      const data = await postData({ action: "getLeaderboard" });
      if (data.status !== "success") {
        throw new Error(data.message || "取得排行榜失敗");
      }
      return data.data || [];
    }

    async function refreshAllViews() {
      currentRows = await fetchHistoryData();
      setChallengeStartDateFromRows(currentRows);

      const today = getTodayStr();
      todayRecord = currentRows.find(r => normalizeDateString(r.date) === today) || null;

      if (!editingRecord) {
        if (todayRecord) fillFormWithRecord(todayRecord);
        else clearTodayForm();
      }

      updateHeaderUI();
      updateHero(currentRows);
      updateTodayStatus();
      renderChallengeCalendar(currentRows);
      renderStats(currentRows);
      await renderLeaderboard();
    }

    async function enterMainPage() {
      loginPage.classList.add("hidden");
      mainPage.classList.remove("hidden");
      editingRecord = null;
      updateHeaderUI();
      await refreshAllViews();
    }

    async function submitHabitCheckin() {
      const userId = localStorage.getItem("user_id");
      if (!userId) {
        showMessage(checkinMsg, "請先登入", true);
        return;
      }

      const today = getTodayStr();
      const habits = getSelectedHabits();
      const habitScore = calculateHabitScore(habits);

      if (!editingRecord && todayRecord && todayRecord.habit_score > 0) {
        showMessage(checkinMsg, "今天的習慣打卡已送出，請點上方今天卡片編輯。", true);
        return;
      }

      setLoading(true);
      showMessage(checkinMsg, "送出習慣打卡中...");

      try {
        const baseRecord = editingRecord || todayRecord;

        if (baseRecord) {
          const data = await postData({
            action: "updateHabitOnly",
            record_id: baseRecord.id,
            user_id: userId,
            date: baseRecord.date,
            habits: habits
          });

          if (data.status === "success") {
            showMessage(checkinMsg, `習慣打卡已更新，分數 ${habitScore}/7`);
          } else {
            showMessage(checkinMsg, data.message || "更新失敗", true);
          }
        } else {
          const data = await postData({
            action: "checkin",
            user_id: userId,
            date: today,
            habits: habits,
            review_good: "",
            review_bad: "",
            review_better: ""
          });

          if (data.status === "success") {
            showMessage(checkinMsg, `習慣打卡成功，分數 ${habitScore}/7`);
          } else {
            showMessage(checkinMsg, data.message || "送出失敗", true);
          }
        }

        editingRecord = null;
        await refreshAllViews();
      } catch (error) {
        showMessage(checkinMsg, "送出失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function submitReviewOnly() {
      const userId = localStorage.getItem("user_id");
      if (!userId) {
        showMessage(reviewMsg, "請先登入", true);
        return;
      }

      const today = getTodayStr();
      const good = reviewGood.value.trim();
      const bad = reviewBad.value.trim();
      const better = reviewBetter.value.trim();
      const reviewScore = calculateReviewScore(good, bad, better);

      if (!editingRecord && todayRecord && todayRecord.review_score > 0) {
        showMessage(reviewMsg, "今天的每日復盤已送出，請點上方今天卡片編輯。", true);
        return;
      }

      if (reviewScore === 0) {
        showMessage(reviewMsg, "請至少填寫一題再送出。", true);
        return;
      }

      setLoading(true);
      showMessage(reviewMsg, "送出每日復盤中...");

      try {
        const baseRecord = editingRecord || todayRecord;

        if (baseRecord) {
          const data = await postData({
            action: "updateReviewOnly",
            record_id: baseRecord.id,
            user_id: userId,
            date: baseRecord.date,
            review_good: good,
            review_bad: bad,
            review_better: better
          });

          if (data.status === "success") {
            showMessage(reviewMsg, `每日復盤已更新，分數 ${reviewScore}/3`);
          } else {
            showMessage(reviewMsg, data.message || "更新失敗", true);
          }
        } else {
          const emptyHabits = [false,false,false,false,false,false,false];
          const data = await postData({
            action: "checkin",
            user_id: userId,
            date: today,
            habits: emptyHabits,
            review_good: good,
            review_bad: bad,
            review_better: better
          });

          if (data.status === "success") {
            showMessage(reviewMsg, `每日復盤成功，分數 ${reviewScore}/3`);
          } else {
            showMessage(reviewMsg, data.message || "送出失敗", true);
          }
        }

        editingRecord = null;
        await refreshAllViews();
      } catch (error) {
        showMessage(reviewMsg, "送出失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    function loadRecordToForm(row) {
      editingRecord = row;
      fillFormWithRecord(row);

      checkinBtn.disabled = false;
      reviewBtn.disabled = false;
      todayHabitStatus.textContent = `目前正在編輯 ${row.date} 的習慣打卡資料。`;
      todayReviewStatus.textContent = `目前正在編輯 ${row.date} 的每日復盤資料。`;

      const formCards = document.querySelectorAll(".form-card");
      const targetCard = formCards[1] || document.querySelector(".form-card");
      if (targetCard) {
        window.scrollTo({
          top: targetCard.offsetTop - 10,
          behavior: "smooth"
        });
      }

      showMessage(checkinMsg, `已載入 ${row.date} 的資料，可分別修改打卡與復盤。`);
      showMessage(reviewMsg, `已載入 ${row.date} 的資料，可分別修改打卡與復盤。`);
    }

    function renderChallengeCalendar(rows) {
      const startDate = getChallengeStartDate();
      const today = getTodayStr();
      const todayIndex = diffDays(startDate, today) + 1;

      const dayMap = {};
      rows.forEach(item => {
        const normalizedDate = normalizeDateString(item.date);
        const dayIndex = diffDays(startDate, normalizedDate) + 1;

        if (dayIndex >= 1 && dayIndex <= 30) {
          dayMap[dayIndex] = { ...item, date: normalizedDate };
        }
      });

      let html = `<div class="challenge-grid">`;

      for (let i = 1; i <= 30; i++) {
        const item = dayMap[i];
        const isToday = i === todayIndex;
        const isPast = i < todayIndex;
        const isFuture = i > todayIndex;

        let classes = ["day-tile"];
        let icon = "🔒";
        let sub = `Day${i}`;
        let meta = "";
        let clickable = false;

        if (item) {
          classes.push("done", "clickable");
          if (isToday) classes.push("today");
          icon = "🌟";
          sub = `${item.total_score}/10 分`;
          meta = `${item.habit_score > 0 ? "打卡✅" : "打卡⬜"} ${item.review_score > 0 ? "復盤✅" : "復盤⬜"}`;
          clickable = true;
        } else if (isToday) {
          classes.push("pending", "today");
          icon = "🫥";
          sub = "未完成";
          meta = "打卡⬜ 復盤⬜";
        } else if (isPast) {
          classes.push("pending");
          icon = "⭕";
          sub = "未完成";
          meta = "打卡⬜ 復盤⬜";
        } else if (isFuture) {
          classes.push("future");
          icon = "🔒";
          sub = "未解鎖";
          meta = "";
        }

        html += `
          <div class="${classes.join(" ")}" ${clickable ? `data-day="${i}"` : ""}>
            <div class="tile-icon">${icon}</div>
            <div class="tile-title">Day${i}</div>
            <div class="tile-sub">${sub}</div>
            <div class="tile-meta">${meta}</div>
          </div>
        `;
      }

      html += `</div>`;
      historyWrap.innerHTML = html;

      historyWrap.querySelectorAll(".day-tile[data-day]").forEach(tile => {
        tile.addEventListener("click", () => {
          const dayNum = Number(tile.getAttribute("data-day"));
          const row = dayMap[dayNum];
          if (!row) return;
          loadRecordToForm(row);
        });
      });
    }

    async function renderLeaderboard() {
      try {
        const rows = await fetchLeaderboard();

        if (!rows.length) {
          leaderboardWrap.innerHTML = `<div class="msg">目前還沒有排行榜資料</div>`;
          return;
        }

        leaderboardWrap.innerHTML = `
          <div class="rank-list">
            ${rows.map((item, index) => `
              <div class="rank-item">
                <div class="rank-left">
                  <div class="rank-no">${index + 1}</div>
                  <div class="rank-name">${item.nickname}</div>
                </div>
                <div class="rank-score">${item.totalScore} 分｜${item.days} 天</div>
              </div>
            `).join("")}
          </div>
        `;
      } catch (error) {
        leaderboardWrap.innerHTML = `<div class="msg">${error.message}</div>`;
      }
    }

    function renderStats(rows) {
      if (!rows.length) {
        statsWrap.innerHTML = `<div class="msg">還沒有統計資料喔</div>`;
        if (scoreChart) {
          scoreChart.destroy();
          scoreChart = null;
        }
        return;
      }

      const sorted = [...rows].sort((a, b) => a.date.localeCompare(b.date));
      const recent7 = sorted.slice(-7);
      const total = sorted.reduce((sum, item) => sum + item.total_score, 0);
      const rate = Math.round((total / (sorted.length * 10)) * 100);

      statsWrap.innerHTML = `
        <div class="chart-card">
          <div class="chart-title">累積達成率</div>
          <div style="text-align:center;font-size:30px;color:#fff0db;">${rate}%</div>
          <div class="hint">共取得 ${total} / ${sorted.length * 10} 分</div>
        </div>

        <div class="chart-card">
          <div class="chart-title">近 7 天總分</div>
          <canvas id="scoreChartCanvas"></canvas>
        </div>
      `;

      const scoreCtx = document.getElementById("scoreChartCanvas");
      if (scoreChart) scoreChart.destroy();

      scoreChart = new Chart(scoreCtx, {
        type: "line",
        data: {
          labels: recent7.map(item => item.date.slice(5)),
          datasets: [{
            label: "每日總分",
            data: recent7.map(item => item.total_score),
            tension: 0.35,
            fill: false,
            borderColor: "#ffb07b",
            backgroundColor: "#ffb07b"
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { color: "#fff0db" }
            }
          },
          scales: {
            x: {
              ticks: { color: "#ffe3cf" },
              grid: { color: "rgba(255,255,255,0.08)" }
            },
            y: {
              beginAtZero: true,
              max: 10,
              ticks: { stepSize: 1, color: "#ffe3cf" },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          }
        }
      });
    }

    function logout() {
      localStorage.removeItem("user_id");
      localStorage.removeItem("nickname");
      currentRows = [];
      todayRecord = null;
      editingRecord = null;
      clearTodayForm();
      historyWrap.innerHTML = "";
      statsWrap.innerHTML = "";
      leaderboardWrap.innerHTML = "";
      mainPage.classList.add("hidden");
      loginPage.classList.remove("hidden");
      nicknameInput.value = "";
      pinInput.value = "";
      showMessage(loginMsg, "已登出");
      showMessage(checkinMsg, "");
      showMessage(reviewMsg, "");
    }

    reviewGood.addEventListener("input", () => updateScoreBoxes());
    reviewBad.addEventListener("input", () => updateScoreBoxes());
    reviewBetter.addEventListener("input", () => updateScoreBoxes());

    loginBtn.addEventListener("click", loginUser);
    registerBtn.addEventListener("click", registerUser);
    checkinBtn.addEventListener("click", submitHabitCheckin);
    reviewBtn.addEventListener("click", submitReviewOnly);
    logoutBtn.addEventListener("click", logout);
    refreshBtn.addEventListener("click", async () => {
      editingRecord = null;
      showMessage(checkinMsg, "資料重新整理中...");
      showMessage(reviewMsg, "資料重新整理中...");
      await refreshAllViews();
      showMessage(checkinMsg, "資料已更新");
      showMessage(reviewMsg, "資料已更新");
    });

    if (localStorage.getItem("user_id")) {
      enterMainPage();
    } else {
      renderHabits([]);
      updateScoreBoxes();
    }
  </script>
</body>
</html>
