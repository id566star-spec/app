<script>
  const API = "https://script.google.com/macros/s/AKfycbz7RmEQzN1a1A780SZhF3R3fcn9dPuhC_VUwMz3Nuw0ctMcVI2gV4HcCrNV3w_op7ga/exec";

  const quotes = [
    "你每天的選擇，決定你的人生 💛",
    "小習慣，會長成大改變 🌱",
    "今天的你，也很值得被鼓勵 ✨",
    "持續，不必完美，只要前進 ☀️",
    "你正在慢慢成為更喜歡的自己 🌷"
  ];

  const habitList = [
    "早起 10 分鐘",
    "喝足夠的水",
    "運動 / 伸展",
    "閱讀 10 分鐘",
    "感恩一件事",
    "正念安靜一下",
    "鼓勵自己一句話"
  ];

  const nicknameInput = document.getElementById("nickname");
  const pinInput = document.getElementById("pin");
  const loginBtn = document.getElementById("loginBtn");
  const registerBtn = document.getElementById("registerBtn");
  const loginMsg = document.getElementById("loginMsg");
  const checkinBtn = document.getElementById("checkinBtn");
  const checkinMsg = document.getElementById("checkinMsg");
  const loginPage = document.getElementById("loginPage");
  const checkinPage = document.getElementById("checkinPage");
  const habitsBox = document.getElementById("habitsBox");
  const logoutBtn = document.getElementById("logoutBtn");
  const helloText = document.getElementById("helloText");
  const quoteText = document.getElementById("quoteText");
  const loadHistoryBtn = document.getElementById("loadHistoryBtn");
  const loadStatsBtn = document.getElementById("loadStatsBtn");
  const historyWrap = document.getElementById("historyWrap");
  const statsWrap = document.getElementById("statsWrap");
  const detailModal = document.getElementById("detailModal");
  const detailContent = document.getElementById("detailContent");
  const closeDetailBtn = document.getElementById("closeDetailBtn");

  let scoreChart = null;
  let habitChart = null;

  quoteText.textContent = quotes[Math.floor(Math.random() * quotes.length)];

  function renderHabits() {
    habitsBox.innerHTML = "";
    habitList.forEach((habit, index) => {
      const item = document.createElement("label");
      item.className = "habit-item";
      item.innerHTML = `
        <span>${habit}</span>
        <input type="checkbox" id="habit_${index}">
      `;
      habitsBox.appendChild(item);
    });
  }

  function setLoading(isLoading) {
    loginBtn.disabled = isLoading;
    registerBtn.disabled = isLoading;
    checkinBtn.disabled = isLoading;
  }

  function showMessage(el, text, isError = false) {
    el.textContent = text;
    el.style.color = isError ? "#ff9d9d" : "#ffd89c";
  }

  function validateInput() {
    const nickname = nicknameInput.value.trim();
    const pin = pinInput.value.trim();

    if (!nickname) {
      showMessage(loginMsg, "請先輸入暱稱", true);
      return null;
    }

    if (!/^\d{4}$/.test(pin)) {
      showMessage(loginMsg, "PIN 必須是 4 位數字", true);
      return null;
    }

    return { nickname, pin };
  }

  async function postData(data) {
    const res = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text();

    try {
      return JSON.parse(text);
    } catch (err) {
      throw new Error("API 回傳不是 JSON：" + text);
    }
  }

  async function registerUser() {
    const form = validateInput();
    if (!form) return;

    showMessage(loginMsg, "註冊中...");
    setLoading(true);

    try {
      const data = await postData({
        action: "register",
        nickname: form.nickname,
        pin: form.pin
      });

      if (data.status === "success") {
        localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("nickname", form.nickname);
        showMessage(loginMsg, "註冊成功，正在進入打卡頁...");
        setTimeout(showCheckinPage, 600);
      } else {
        showMessage(loginMsg, data.message || "註冊失敗", true);
      }
    } catch (error) {
      showMessage(loginMsg, "註冊失敗：" + error.message, true);
      console.error(error);
    } finally {
      setLoading(false);
    }
  }

  async function loginUser() {
    const form = validateInput();
    if (!form) return;

    showMessage(loginMsg, "登入中...");
    setLoading(true);

    try {
      const data = await postData({
        action: "login",
        nickname: form.nickname,
        pin: form.pin
      });

      if (data.status === "success") {
        localStorage.setItem("user_id", data.user_id);
        localStorage.setItem("nickname", form.nickname);
        showMessage(loginMsg, "登入成功，正在進入打卡頁...");
        setTimeout(showCheckinPage, 600);
      } else {
        showMessage(loginMsg, "登入失敗，請確認暱稱與 PIN", true);
      }
    } catch (error) {
      showMessage(loginMsg, "登入失敗：" + error.message, true);
      console.error(error);
    } finally {
      setLoading(false);
    }
  }

  async function submitCheckin() {
    const userId = localStorage.getItem("user_id");
    const nickname = localStorage.getItem("nickname") || "你";

    if (!userId) {
      showMessage(checkinMsg, "尚未登入，請先登入", true);
      return;
    }

    const habits = [];
    for (let i = 0; i < habitList.length; i++) {
      habits.push(document.getElementById(`habit_${i}`).checked);
    }

    showMessage(checkinMsg, "送出打卡中...");
    setLoading(true);

    try {
      const data = await postData({
        action: "checkin",
        user_id: userId,
        nickname: nickname,
        date: new Date().toLocaleDateString("sv-SE"),
        habits: habits
      });

      if (data.status === "success") {
        showMessage(checkinMsg, `打卡成功，今日得分 ${data.score} / 7 ✨`);
        await loadHistory();
        await loadStats();
      } else {
        showMessage(checkinMsg, data.message || "打卡失敗", true);
      }
    } catch (error) {
      showMessage(checkinMsg, "打卡失敗：" + error.message, true);
      console.error(error);
    } finally {
      setLoading(false);
    }
  }

  function showCheckinPage() {
    const nickname = localStorage.getItem("nickname") || "你";
    loginPage.classList.add("hidden");
    checkinPage.classList.remove("hidden");
    helloText.textContent = `${nickname}，今天也一起慢慢變好 🌷`;
    renderHabits();
  }

  function logout() {
    localStorage.removeItem("user_id");
    localStorage.removeItem("nickname");
    checkinPage.classList.add("hidden");
    loginPage.classList.remove("hidden");
    nicknameInput.value = "";
    pinInput.value = "";
    showMessage(loginMsg, "已登出");
    showMessage(checkinMsg, "");
    historyWrap.innerHTML = "";
    statsWrap.innerHTML = "";
  }

  function formatDateToYMD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function getEmojiByScore(score) {
    if (score >= 6) return "😊";
    if (score >= 4) return "🙂";
    if (score >= 1) return "😶";
    return " ";
  }

  function normalizeHistoryRows(rows) {
    return rows.map(row => ({
      id: row[0],
      user_id: row[1],
      date: row[2],
      habits: [row[3], row[4], row[5], row[6], row[7], row[8], row[9]].map(v => {
        if (v === true || v === "TRUE" || v === "true") return true;
        return false;
      }),
      score: Number(row[10]) || 0,
      created_at: row[11]
    }));
  }

  async function fetchHistoryData() {
    const userId = localStorage.getItem("user_id");
    if (!userId) throw new Error("尚未登入");

    const data = await postData({
      action: "getData",
      user_id: userId
    });

    if (data.status !== "success") {
      throw new Error(data.message || "取得資料失敗");
    }

    return normalizeHistoryRows(data.data || []);
  }

  async function loadHistory() {
    historyWrap.innerHTML = `<div class="msg">讀取紀錄中...</div>`;

    try {
      const rows = await fetchHistoryData();
      renderCalendar(rows);
    } catch (error) {
      historyWrap.innerHTML = `<div class="msg" style="color:#ff9d9d;">${error.message}</div>`;
      console.error(error);
    }
  }

  function renderCalendar(rows) {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startWeekday = firstDay.getDay();
    const totalDays = lastDay.getDate();

    const map = {};
    rows.forEach(item => {
      map[item.date] = item;
    });

    let html = `
      <div class="calendar-box">
        <div style="text-align:center;font-size:20px;margin-bottom:14px;color:#ffe7b0;">
          ${year} 年 ${month + 1} 月
        </div>
        <div class="calendar-head">
          <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
        </div>
        <div class="calendar-grid">
    `;

    for (let i = 0; i < startWeekday; i++) {
      html += `<div class="day-cell empty"></div>`;
    }

    for (let day = 1; day <= totalDays; day++) {
      const dateStr = formatDateToYMD(new Date(year, month, day));
      const item = map[dateStr];
      const score = item ? item.score : 0;
      const emoji = item ? getEmojiByScore(score) : "";
      const hasData = !!item;

      html += `
        <div class="day-cell ${hasData ? "" : ""}" ${hasData ? `data-date="${dateStr}"` : ""}>
          <div class="day-num">${day}</div>
          <div class="day-emoji">${emoji}</div>
          <div class="day-score">${hasData ? `${score}/7` : ""}</div>
        </div>
      `;
    }

    html += `</div></div>`;
    historyWrap.innerHTML = html;

    historyWrap.querySelectorAll(".day-cell[data-date]").forEach(cell => {
      cell.addEventListener("click", () => {
        const date = cell.getAttribute("data-date");
        const row = rows.find(r => r.date === date);
        if (row) showDetail(row);
      });
    });
  }

  function showDetail(row) {
    const habitHtml = row.habits.map((done, index) => {
      return `
        <div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.06);">
          ${done ? "✅" : "⬜"} ${habitList[index]}
        </div>
      `;
    }).join("");

    detailContent.innerHTML = `
      <div style="margin-bottom:10px;">📅 日期：${row.date}</div>
      <div style="margin-bottom:10px;">⭐ 分數：${row.score} / 7</div>
      <div style="margin-bottom:12px;color:#ffe7b0;">今日完成項目</div>
      <div>${habitHtml}</div>
    `;

    detailModal.classList.remove("hidden");
  }

  function renderStats(rows) {
    if (!rows.length) {
      statsWrap.innerHTML = `<div class="msg">還沒有打卡資料喔</div>`;
      return;
    }

    const sorted = [...rows].sort((a, b) => a.date.localeCompare(b.date));
    const recent7 = sorted.slice(-7);

    const habitTotals = Array(7).fill(0);
    sorted.forEach(item => {
      item.habits.forEach((done, i) => {
        if (done) habitTotals[i]++;
      });
    });

    const totalPossible = sorted.length * 7;
    const totalDone = sorted.reduce((sum, item) => sum + item.score, 0);
    const rate = totalPossible ? Math.round((totalDone / totalPossible) * 100) : 0;

    statsWrap.innerHTML = `
      <div class="chart-card">
        <div class="chart-title">累積達成率</div>
        <div style="text-align:center;font-size:28px;color:#fff;">${rate}%</div>
        <div style="text-align:center;margin-top:8px;color:#d8cfc2;">
          共完成 ${totalDone} / ${totalPossible} 次習慣
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">近 7 次打卡分數</div>
        <canvas id="scoreChartCanvas"></canvas>
      </div>

      <div class="chart-card">
        <div class="chart-title">7 個習慣累積完成次數</div>
        <canvas id="habitChartCanvas"></canvas>
      </div>
    `;

    const scoreCtx = document.getElementById("scoreChartCanvas");
    const habitCtx = document.getElementById("habitChartCanvas");

    if (scoreChart) scoreChart.destroy();
    if (habitChart) habitChart.destroy();

    scoreChart = new Chart(scoreCtx, {
      type: "line",
      data: {
        labels: recent7.map(item => item.date.slice(5)),
        datasets: [{
          label: "每日分數",
          data: recent7.map(item => item.score),
          tension: 0.35,
          fill: false
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#fff" } }
        },
        scales: {
          x: { ticks: { color: "#ddd" } },
          y: {
            beginAtZero: true,
            max: 7,
            ticks: { stepSize: 1, color: "#ddd" }
          }
        }
      }
    });

    habitChart = new Chart(habitCtx, {
      type: "bar",
      data: {
        labels: habitList,
        datasets: [{
          label: "完成次數",
          data: habitTotals
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#fff" } }
        },
        scales: {
          x: {
            ticks: { color: "#ddd" }
          },
          y: {
            beginAtZero: true,
            ticks: { color: "#ddd" }
          }
        }
      }
    });
  }

  async function loadStats() {
    statsWrap.innerHTML = `<div class="msg">統計分析中...</div>`;

    try {
      const rows = await fetchHistoryData();
      renderStats(rows);
    } catch (error) {
      statsWrap.innerHTML = `<div class="msg" style="color:#ff9d9d;">${error.message}</div>`;
      console.error(error);
    }
  }

  loginBtn.addEventListener("click", loginUser);
  registerBtn.addEventListener("click", registerUser);
  checkinBtn.addEventListener("click", submitCheckin);
  logoutBtn.addEventListener("click", logout);
  loadHistoryBtn.addEventListener("click", loadHistory);
  loadStatsBtn.addEventListener("click", loadStats);
  closeDetailBtn.addEventListener("click", () => {
    detailModal.classList.add("hidden");
  });

  detailModal.addEventListener("click", (e) => {
    if (e.target === detailModal) {
      detailModal.classList.add("hidden");
    }
  });

  if (localStorage.getItem("user_id")) {
    showCheckinPage();
  }
</script>
