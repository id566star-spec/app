<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30天打卡身心靈成長競賽</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "ZCOOL KuaiLe", cursive;
      background: #4a2400;
      color: #f7eadf;
    }

    .top {
      background: linear-gradient(180deg, #6a3300 0%, #5a2b00 100%);
      padding: 20px 16px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .top h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.4;
      color: #fff1df;
    }

    .top p {
      margin: 8px 0 0;
      font-size: 15px;
      color: #ffd9b7;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      padding: 14px 14px 30px;
    }

    .card {
      background: rgba(40, 18, 0, 0.42);
      border-radius: 22px;
      padding: 18px 14px 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
    }

    .section-title {
      text-align: center;
      font-size: 22px;
      margin: 0 0 14px;
      color: #fff0db;
    }

    .field {
      margin-bottom: 14px;
    }

    .label {
      font-size: 15px;
      margin-bottom: 8px;
      color: #ffd8bb;
      display: block;
    }

    input, textarea {
      width: 100%;
      border: none;
      outline: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      background: rgba(255,255,255,0.12);
      color: #fff4ea;
      font-family: inherit;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255, 234, 220, 0.68);
    }

    .btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: none;
      outline: none;
      cursor: pointer;
      background: #b96539;
      color: #fff;
      border-radius: 16px;
      padding: 13px 22px;
      font-size: 18px;
      font-family: inherit;
      box-shadow: 0 6px 14px rgba(0,0,0,0.16);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .small-btn {
      background: #92634d;
      font-size: 15px;
      padding: 11px 18px;
      box-shadow: none;
    }

    .outline-btn {
      background: transparent;
      color: #ffd7bd;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: none;
    }

    .msg {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      min-height: 22px;
      color: #ffd4ba;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    .quote {
      text-align: center;
      margin: 0 0 14px;
      color: #ffe0c6;
      font-size: 15px;
      line-height: 1.7;
    }

    .habit-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.08);
      padding: 13px 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      font-size: 15px;
      color: #fff0e3;
    }

    .habit-item input[type="checkbox"] {
      width: 24px;
      height: 24px;
      accent-color: #ff9f66;
    }

    .sub-card {
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px;
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .sub-title {
      font-size: 18px;
      margin-bottom: 12px;
      color: #fff0db;
      text-align: center;
    }

    .calendar-box {
      background: rgba(32, 14, 0, 0.34);
      border-radius: 18px;
      padding: 14px 10px;
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .calendar-head {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 10px;
      text-align: center;
      color: #ffe2cb;
      font-size: 13px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-cell {
      min-height: 68px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      padding: 6px 3px;
      text-align: center;
      cursor: pointer;
      font-size: 12px;
      color: #fff1e4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .day-cell:hover {
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    .day-cell.empty {
      background: transparent;
      cursor: default;
      border-color: transparent;
      transform: none;
    }

    .day-num {
      font-size: 12px;
      margin-bottom: 4px;
    }

    .day-emoji {
      font-size: 20px;
      line-height: 1;
      min-height: 22px;
    }

    .day-score {
      font-size: 11px;
      margin-top: 4px;
      color: #ffd5b2;
    }

    .today-mark {
      border-color: #ff9f66;
      background: rgba(255, 159, 102, 0.12);
    }

    .has-record {
      background: rgba(255, 213, 178, 0.12);
      border: 1px solid rgba(255, 159, 102, 0.45);
      box-shadow: inset 0 0 0 1px rgba(255, 159, 102, 0.10);
    }

    .record-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ffb07b;
      margin-top: 4px;
    }

    .chart-card {
      background: rgba(32, 14, 0, 0.34);
      border-radius: 18px;
      padding: 14px;
      margin-top: 14px;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .chart-title {
      font-size: 17px;
      margin-bottom: 12px;
      text-align: center;
      color: #fff0db;
    }

    .review-box {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      margin-top: 8px;
      line-height: 1.7;
      color: #fff0e2;
      font-size: 14px;
      word-break: break-word;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 999;
      padding: 16px;
      overflow: auto;
    }

    .modal-card {
      max-width: 430px;
      margin: 30px auto;
      background: #5a2b00;
      border-radius: 22px;
      padding: 18px 14px 20px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.10);
    }

    .modal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 22px;
      color: #fff0db;
    }

    .score-pill {
      display: inline-block;
      background: rgba(255, 214, 188, 0.12);
      color: #ffd7bd;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 14px;
      margin-top: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hint {
      text-align: center;
      color: #ffd6bb;
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="top">
    <h1>🌱 30天身心靈挑戰</h1>
    <p id="quoteText">每天都值得變得更美好 💛</p>
  </div>

  <div class="wrap">
    <div class="card" id="loginPage">
      <div class="section-title">登入 / 註冊</div>

      <div class="field">
        <label class="label" for="nickname">暱稱</label>
        <input id="nickname" type="text" placeholder="請輸入你的暱稱">
      </div>

      <div class="field">
        <label class="label" for="pin">PIN（4位數）</label>
        <input id="pin" type="password" maxlength="4" inputmode="numeric" placeholder="請輸入 4 位數 PIN">
      </div>

      <div class="btns">
        <button id="loginBtn" type="button">登入</button>
        <button id="registerBtn" type="button">註冊</button>
      </div>

      <div class="msg" id="loginMsg"></div>
    </div>

    <div class="hidden" id="mainPage">
      <div class="card">
        <div class="section-title">今日打卡</div>
        <div class="quote" id="helloText"></div>
        <div id="todayStatusHint" class="hint"></div>

        <div id="habitsBox"></div>

        <div class="sub-card">
          <div class="sub-title">🌙 今日復盤</div>

          <div class="field">
            <label class="label" for="reviewGood">✅ 今天做得好的一件事</label>
            <textarea id="reviewGood" placeholder="哪怕只是小事，也值得被看見 🌱"></textarea>
          </div>

          <div class="field">
            <label class="label" for="reviewBad">❌ 今天可以更好的一件事</label>
            <textarea id="reviewBad" placeholder="不批判自己，只是觀察 💛"></textarea>
          </div>

          <div class="field" style="margin-bottom:0;">
            <label class="label" for="reviewBetter">💡 我可以怎麼想會更好？</label>
            <textarea id="reviewBetter" placeholder="一個小小的改變就夠了 ✨"></textarea>
          </div>
        </div>

        <div class="btns">
          <button id="checkinBtn" type="button">完成今日打卡</button>
        </div>

        <div class="msg" id="checkinMsg"></div>

        <div class="btns">
          <button class="small-btn" id="refreshBtn" type="button">重新整理資料</button>
          <button class="small-btn outline-btn" id="logoutBtn" type="button">登出</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">月曆檢視</div>
        <div id="historyWrap"></div>
      </div>

      <div class="card">
        <div class="section-title">成果統計</div>
        <div id="statsWrap"></div>
      </div>
    </div>
  </div>

  <div id="detailModal" class="modal-mask hidden">
    <div class="modal-card">
      <div class="modal-top">
        <div class="modal-title">當日紀錄</div>
        <button class="small-btn" id="closeDetailBtn" type="button">關閉</button>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbx4mEsUFeBq2XwWQurV6MV7ggMFzMiO0XSZq3tb_21GHmvGo0Syjfl0u58xv-SDTTSK/exec";

    const quotes = [
      "不要小心計算如何，先把今天挺住就夠好了。",
      "持續不是逼自己，而是每天都溫柔地再試一次。",
      "小小的完成，也是在替未來的自己鋪路。",
      "今天的你，不需要完美，只需要前進一點點。",
      "你願意回來照顧自己，已經很棒了。"
    ];

    const habitList = [
      "早起 10 分鐘",
      "喝足夠的水",
      "運動 / 伸展",
      "閱讀 10 分鐘",
      "感恩一件事",
      "正念安靜一下",
      "鼓勵自己一句話"
    ];

    const nicknameInput = document.getElementById("nickname");
    const pinInput = document.getElementById("pin");
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const loginMsg = document.getElementById("loginMsg");

    const mainPage = document.getElementById("mainPage");
    const loginPage = document.getElementById("loginPage");
    const helloText = document.getElementById("helloText");
    const quoteText = document.getElementById("quoteText");
    const habitsBox = document.getElementById("habitsBox");
    const todayStatusHint = document.getElementById("todayStatusHint");

    const reviewGood = document.getElementById("reviewGood");
    const reviewBad = document.getElementById("reviewBad");
    const reviewBetter = document.getElementById("reviewBetter");

    const checkinBtn = document.getElementById("checkinBtn");
    const checkinMsg = document.getElementById("checkinMsg");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const historyWrap = document.getElementById("historyWrap");
    const statsWrap = document.getElementById("statsWrap");

    const detailModal = document.getElementById("detailModal");
    const detailContent = document.getElementById("detailContent");
    const closeDetailBtn = document.getElementById("closeDetailBtn");

    let scoreChart = null;
    let habitChart = null;
    let currentRows = [];
    let todayExistingRecord = null;
    let editingRecord = null;

    quoteText.textContent = quotes[Math.floor(Math.random() * quotes.length)];

    function formatDateToYMD(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getTodayStr() {
      return formatDateToYMD(new Date());
    }

    function renderHabits(selected = []) {
      habitsBox.innerHTML = "";
      habitList.forEach((habit, index) => {
        const item = document.createElement("label");
        item.className = "habit-item";
        item.innerHTML = `
          <span>${habit}</span>
          <input type="checkbox" id="habit_${index}" ${selected[index] ? "checked" : ""}>
        `;
        habitsBox.appendChild(item);
      });
    }

    function getSelectedHabits() {
      const habits = [];
      for (let i = 0; i < habitList.length; i++) {
        habits.push(document.getElementById(`habit_${i}`).checked);
      }
      return habits;
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      registerBtn.disabled = isLoading;
      checkinBtn.disabled = isLoading;
      refreshBtn.disabled = isLoading;
    }

    function showMessage(el, text, isError = false) {
      el.textContent = text;
      el.style.color = isError ? "#ff9e9e" : "#ffd4ba";
    }

    function validateInput() {
      const nickname = nicknameInput.value.trim();
      const pin = pinInput.value.trim();

      if (!nickname) {
        showMessage(loginMsg, "請先輸入暱稱", true);
        return null;
      }

      if (!/^\d{4}$/.test(pin)) {
        showMessage(loginMsg, "PIN 必須是 4 位數字", true);
        return null;
      }

      return { nickname, pin };
    }

    async function postData(data) {
      const res = await fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(data)
      });

      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error("API 回傳不是 JSON：" + text);
      }
    }

    function normalizeHistoryRows(rows) {
      return rows.map(row => ({
        id: String(row[0] || ""),
        user_id: String(row[1] || ""),
        date: String(row[2] || ""),
        habits: [row[3], row[4], row[5], row[6], row[7], row[8], row[9]].map(v => {
          return v === true || v === "TRUE" || v === "true";
        }),
        score: Number(row[10]) || 0,
        review_good: String(row[11] || ""),
        review_bad: String(row[12] || ""),
        review_better: String(row[13] || ""),
        created_at: row[14] || ""
      }));
    }

    async function registerUser() {
      const form = validateInput();
      if (!form) return;

      setLoading(true);
      showMessage(loginMsg, "註冊中...");

      try {
        const data = await postData({
          action: "register",
          nickname: form.nickname,
          pin: form.pin
        });

        if (data.status === "success") {
          localStorage.setItem("user_id", data.user_id);
          localStorage.setItem("nickname", form.nickname);
          showMessage(loginMsg, "註冊成功");
          await enterMainPage();
        } else {
          showMessage(loginMsg, data.message || "註冊失敗", true);
        }
      } catch (error) {
        showMessage(loginMsg, "註冊失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function loginUser() {
      const form = validateInput();
      if (!form) return;

      setLoading(true);
      showMessage(loginMsg, "登入中...");

      try {
        const data = await postData({
          action: "login",
          nickname: form.nickname,
          pin: form.pin
        });

        if (data.status === "success") {
          localStorage.setItem("user_id", data.user_id);
          localStorage.setItem("nickname", form.nickname);
          showMessage(loginMsg, "登入成功");
          await enterMainPage();
        } else {
          showMessage(loginMsg, "登入失敗，請確認暱稱與 PIN", true);
        }
      } catch (error) {
        showMessage(loginMsg, "登入失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function fetchHistoryData() {
      const userId = localStorage.getItem("user_id");
      if (!userId) throw new Error("尚未登入");

      const data = await postData({
        action: "getData",
        user_id: userId
      });

      if (data.status !== "success") {
        throw new Error(data.message || "取得資料失敗");
      }

      return normalizeHistoryRows(data.data || []);
    }

    function fillFormWithRecord(record) {
      renderHabits(record?.habits || []);
      reviewGood.value = record?.review_good || "";
      reviewBad.value = record?.review_bad || "";
      reviewBetter.value = record?.review_better || "";
    }

    function clearTodayForm() {
      renderHabits([]);
      reviewGood.value = "";
      reviewBad.value = "";
      reviewBetter.value = "";
    }

    function updateTodayStatus() {
      const nickname = localStorage.getItem("nickname") || "你";
      helloText.textContent = `${nickname}，今天也一起慢慢變好 🌷`;

      if (editingRecord) {
        todayStatusHint.textContent = `目前正在編輯 ${editingRecord.date} 的紀錄，修改後按「完成今日打卡」即可儲存。`;
        checkinBtn.disabled = false;
        return;
      }

      if (todayExistingRecord) {
        todayStatusHint.textContent = `今天已打卡，今日分數：${todayExistingRecord.score}/7。若要修改，請點月曆中的今天。`;
        checkinBtn.disabled = true;
      } else {
        todayStatusHint.textContent = "今天還沒打卡，完成後就會記錄到月曆上。";
        checkinBtn.disabled = false;
      }
    }

    async function refreshAllViews() {
      currentRows = await fetchHistoryData();
      const today = getTodayStr();
      todayExistingRecord = currentRows.find(r => r.date === today) || null;

      if (!editingRecord) {
        if (todayExistingRecord) {
          fillFormWithRecord(todayExistingRecord);
        } else {
          clearTodayForm();
        }
      }

      updateTodayStatus();
      renderCalendar(currentRows);
      renderStats(currentRows);
    }

    async function enterMainPage() {
      loginPage.classList.add("hidden");
      mainPage.classList.remove("hidden");
      editingRecord = null;
      await refreshAllViews();
    }

    async function createTodayCheckin() {
      const userId = localStorage.getItem("user_id");
      if (!userId) {
        showMessage(checkinMsg, "請先登入", true);
        return;
      }

      if (todayExistingRecord) {
        showMessage(checkinMsg, "今天已經打卡過了，請到月曆點今天進行編輯。", true);
        return;
      }

      const habits = getSelectedHabits();

      setLoading(true);
      showMessage(checkinMsg, "送出今日打卡中...");

      try {
        const data = await postData({
          action: "checkin",
          user_id: userId,
          date: getTodayStr(),
          habits: habits,
          review_good: reviewGood.value.trim(),
          review_bad: reviewBad.value.trim(),
          review_better: reviewBetter.value.trim()
        });

        if (data.status === "success") {
          if (data.mode === "updated") {
            showMessage(checkinMsg, `今天已有紀錄，系統已幫你更新為 ${data.score}/7 ✨`);
          } else {
            showMessage(checkinMsg, `今日打卡成功，得分 ${data.score}/7 ✨`);
          }
          editingRecord = null;
          await refreshAllViews();
        } else {
          showMessage(checkinMsg, data.message || "打卡失敗", true);
        }
      } catch (error) {
        showMessage(checkinMsg, "打卡失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function updateCheckin(recordId, dateStr) {
      const userId = localStorage.getItem("user_id");
      if (!userId) {
        showMessage(checkinMsg, "請先登入", true);
        return;
      }

      const habits = getSelectedHabits();

      setLoading(true);
      showMessage(checkinMsg, "更新紀錄中...");

      try {
        const data = await postData({
          action: "updateCheckin",
          record_id: recordId,
          user_id: userId,
          date: dateStr,
          habits: habits,
          review_good: reviewGood.value.trim(),
          review_bad: reviewBad.value.trim(),
          review_better: reviewBetter.value.trim()
        });

        if (data.status === "success") {
          showMessage(checkinMsg, `已更新 ${dateStr} 的打卡紀錄，得分 ${data.score}/7`);
          editingRecord = null;
          detailModal.classList.add("hidden");
          await refreshAllViews();
        } else {
          showMessage(checkinMsg, data.message || "更新失敗", true);
        }
      } catch (error) {
        showMessage(checkinMsg, "更新失敗：" + error.message, true);
      } finally {
        setLoading(false);
      }
    }

    async function handleCheckinSubmit() {
      if (editingRecord) {
        await updateCheckin(editingRecord.id, editingRecord.date);
      } else {
        await createTodayCheckin();
      }
    }

    function getEmojiByScore(score) {
      if (score >= 6) return "😊";
      if (score >= 4) return "🙂";
      if (score >= 1) return "😶";
      return "";
    }

    function loadRecordToForm(row) {
      editingRecord = row;
      renderHabits(row.habits || []);
      reviewGood.value = row.review_good || "";
      reviewBad.value = row.review_bad || "";
      reviewBetter.value = row.review_better || "";

      checkinBtn.disabled = false;
      todayStatusHint.textContent = `目前正在編輯 ${row.date} 的紀錄，修改後按「完成今日打卡」即可儲存。`;

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });

      showMessage(checkinMsg, `已載入 ${row.date} 的舊紀錄，可以直接修改。`);
    }

    function renderCalendar(rows) {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startWeekday = firstDay.getDay();
      const totalDays = lastDay.getDate();
      const today = getTodayStr();

      const map = {};
      rows.forEach(item => {
        if (item.date) {
          map[item.date] = item;
        }
      });

      let html = `
        <div class="calendar-box">
          <div style="text-align:center;font-size:19px;margin-bottom:12px;color:#fff0db;">
            ${year} 年 ${month + 1} 月
          </div>
          <div class="calendar-head">
            <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
          </div>
          <div class="calendar-grid">
      `;

      for (let i = 0; i < startWeekday; i++) {
        html += `<div class="day-cell empty"></div>`;
      }

      for (let day = 1; day <= totalDays; day++) {
        const dateStr = formatDateToYMD(new Date(year, month, day));
        const item = map[dateStr];
        const hasRecord = !!item;
        const score = hasRecord ? item.score : 0;
        const emoji = hasRecord ? getEmojiByScore(score) : "";
        const classes = ["day-cell"];

        if (dateStr === today) classes.push("today-mark");
        if (hasRecord) classes.push("has-record");

        html += `
          <div class="${classes.join(" ")}" ${hasRecord ? `data-date="${dateStr}"` : ""}>
            <div class="day-num">${day}</div>
            <div class="day-emoji">${hasRecord ? emoji : ""}</div>
            <div class="day-score">${hasRecord ? `${score}/7` : ""}</div>
            ${hasRecord ? `<div class="record-dot"></div>` : ""}
          </div>
        `;
      }

      html += `</div></div>`;
      historyWrap.innerHTML = html;

      historyWrap.querySelectorAll(".day-cell[data-date]").forEach(cell => {
        cell.addEventListener("click", () => {
          const date = cell.getAttribute("data-date");
          const row = rows.find(r => r.date === date);
          if (row) {
            loadRecordToForm(row);
            showDetail(row);
          }
        });
      });
    }

    function showDetail(row) {
      const habitHtml = row.habits.map((done, index) => `
        <div class="review-box">${done ? "✅" : "⬜"} ${habitList[index]}</div>
      `).join("");

      detailContent.innerHTML = `
        <div style="font-size:16px;">📅 日期：${row.date}</div>
        <div class="score-pill">今日得分：${row.score} / 7</div>

        <div style="margin-top:16px;font-size:16px;color:#fff0db;">今日習慣完成</div>
        <div style="margin-top:8px;">${habitHtml}</div>

        <div style="margin-top:16px;font-size:16px;color:#fff0db;">今日復盤</div>
        <div class="review-box">✅ 今天做得好的一件事：${row.review_good || "未填寫"}</div>
        <div class="review-box">❌ 今天可以更好的一件事：${row.review_bad || "未填寫"}</div>
        <div class="review-box">💡 我可以怎麼想會更好：${row.review_better || "未填寫"}</div>

        <div class="btns" style="margin-top:16px;">
          <button id="editThisDayBtn" type="button">編輯這一天</button>
        </div>
      `;

      detailModal.classList.remove("hidden");

      document.getElementById("editThisDayBtn").addEventListener("click", () => {
        loadRecordToForm(row);
        detailModal.classList.add("hidden");
      });
    }

    function renderStats(rows) {
      if (!rows.length) {
        statsWrap.innerHTML = `<div class="msg">還沒有統計資料喔</div>`;
        if (scoreChart) {
          scoreChart.destroy();
          scoreChart = null;
        }
        if (habitChart) {
          habitChart.destroy();
          habitChart = null;
        }
        return;
      }

      const sorted = [...rows].sort((a, b) => a.date.localeCompare(b.date));
      const recent7 = sorted.slice(-7);

      const habitTotals = Array(7).fill(0);
      sorted.forEach(item => {
        item.habits.forEach((done, i) => {
          if (done) habitTotals[i]++;
        });
      });

      const totalPossible = sorted.length * 7;
      const totalDone = sorted.reduce((sum, item) => sum + item.score, 0);
      const rate = totalPossible ? Math.round((totalDone / totalPossible) * 100) : 0;

      statsWrap.innerHTML = `
        <div class="chart-card">
          <div class="chart-title">累積達成率</div>
          <div style="text-align:center;font-size:30px;color:#fff0db;">${rate}%</div>
          <div class="hint">共完成 ${totalDone} / ${totalPossible} 次習慣</div>
        </div>

        <div class="chart-card">
          <div class="chart-title">近 7 次打卡分數</div>
          <canvas id="scoreChartCanvas"></canvas>
        </div>

        <div class="chart-card">
          <div class="chart-title">7 個習慣累積完成次數</div>
          <canvas id="habitChartCanvas"></canvas>
        </div>
      `;

      const scoreCtx = document.getElementById("scoreChartCanvas");
      const habitCtx = document.getElementById("habitChartCanvas");

      if (scoreChart) scoreChart.destroy();
      if (habitChart) habitChart.destroy();

      scoreChart = new Chart(scoreCtx, {
        type: "line",
        data: {
          labels: recent7.map(item => item.date.slice(5)),
          datasets: [{
            label: "每日分數",
            data: recent7.map(item => item.score),
            tension: 0.35,
            fill: false,
            borderColor: "#ffb07b",
            backgroundColor: "#ffb07b"
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { color: "#fff0db" }
            }
          },
          scales: {
            x: {
              ticks: { color: "#ffe3cf" },
              grid: { color: "rgba(255,255,255,0.08)" }
            },
            y: {
              beginAtZero: true,
              max: 7,
              ticks: { stepSize: 1, color: "#ffe3cf" },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          }
        }
      });

      habitChart = new Chart(habitCtx, {
        type: "bar",
        data: {
          labels: habitList,
          datasets: [{
            label: "完成次數",
            data: habitTotals,
            backgroundColor: "rgba(255, 176, 123, 0.7)",
            borderColor: "#ffb07b",
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { color: "#fff0db" }
            }
          },
          scales: {
            x: {
              ticks: { color: "#ffe3cf" },
              grid: { color: "rgba(255,255,255,0.05)" }
            },
            y: {
              beginAtZero: true,
              ticks: { color: "#ffe3cf" },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          }
        }
      });
    }

    function logout() {
      localStorage.removeItem("user_id");
      localStorage.removeItem("nickname");
      currentRows = [];
      todayExistingRecord = null;
      editingRecord = null;
      clearTodayForm();
      historyWrap.innerHTML = "";
      statsWrap.innerHTML = "";
      mainPage.classList.add("hidden");
      loginPage.classList.remove("hidden");
      nicknameInput.value = "";
      pinInput.value = "";
      showMessage(loginMsg, "已登出");
      showMessage(checkinMsg, "");
    }

    loginBtn.addEventListener("click", loginUser);
    registerBtn.addEventListener("click", registerUser);
    checkinBtn.addEventListener("click", handleCheckinSubmit);
    logoutBtn.addEventListener("click", logout);
    refreshBtn.addEventListener("click", async () => {
      editingRecord = null;
      showMessage(checkinMsg, "資料重新整理中...");
      await refreshAllViews();
      showMessage(checkinMsg, "資料已更新");
    });
    closeDetailBtn.addEventListener("click", () => detailModal.classList.add("hidden"));
    detailModal.addEventListener("click", (e) => {
      if (e.target === detailModal) detailModal.classList.add("hidden");
    });

    if (localStorage.getItem("user_id")) {
      enterMainPage();
    } else {
      renderHabits([]);
    }
  </script>
</body>
</html>
